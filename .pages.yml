media:
  input: public
  output: /
content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/posts
    view:
      fields: [ title, draft, pubDatetime ]
    fields:
      - { name: author, label: Author, type: string }
      - { name: pubDatetime, label: Date, type: date }
      - { name: modDatetime, label: Modified Date, type: date }
      - { name: title, label: Title, type: string, required: true }
      - { name: ogImage, label: OG Image, type: string }
      - { name: slug, label: Slug, type: string }
      - { name: featured, label: Featured, type: boolean }
      - { name: draft, label: Draft, type: boolean }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: description, label: Description, type: string }
      - { name: body, label: Body, type: rich-text }
  - name: legacy_blog
    label: Legacy Blog
    type: collection
    path: src/content/blog
    view:
      fields: [ title, draft, pubDatetime ]
    fields:
      - { name: author, label: Author, type: string }
      - { name: pubDatetime, label: Date, type: date }
      - { name: modDatetime, label: Modified Date, type: date }
      - { name: title, label: Title, type: string, required: true }
      - { name: ogImage, label: OG Image, type: string }
      - { name: slug, label: Slug, type: string }
      - { name: featured, label: Featured, type: boolean }
      - { name: draft, label: Draft, type: boolean }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: description, label: Description, type: string }
      - { name: body, label: Body, type: rich-text }
  - name: notes
    label: Notes
    type: collection
    path: src/content/notes
    view:
      fields: [ title, draft, pubDatetime ]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: pubDatetime, label: Date, type: date }
      - { name: modDatetime, label: Modified Date, type: date }
      - { name: draft, label: Draft, type: boolean }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: description, label: Description, type: string }
      - { name: body, label: Body, type: rich-text }
  - name: projects
    label: Projects
    type: collection
    path: src/content/projects
    view:
      fields: [ title, status, featured, draft ]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: string }
      - { name: pubDatetime, label: Date, type: date }
      - { name: featured, label: Featured, type: boolean }
      - { name: draft, label: Draft, type: boolean }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: stack, label: Stack, type: string, list: true }
      - { name: status, label: Status, type: string, default: building }
      - { name: repoURL, label: Repository URL, type: string }
      - { name: demoURL, label: Demo URL, type: string }
      - { name: cover, label: Cover Image, type: string }
      - { name: body, label: Body, type: rich-text }
  - name: experiences
    label: Experiences
    type: collection
    path: src/content/experiences
    view:
      fields: [ title, organization, current, startDate ]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: organization, label: Organization, type: string, required: true }
      - { name: role, label: Role, type: string }
      - { name: location, label: Location, type: string }
      - { name: startDate, label: Start Date, type: date }
      - { name: endDate, label: End Date, type: date }
      - { name: current, label: Current, type: boolean }
      - { name: draft, label: Draft, type: boolean }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: description, label: Description, type: string }
      - { name: body, label: Body, type: rich-text }
  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    view:
      fields: [ title, draft, updatedDatetime ]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: string }
      - { name: draft, label: Draft, type: boolean }
      - { name: updatedDatetime, label: Updated Date, type: date }
      - { name: body, label: Body, type: rich-text }
  - name: about
    label: About page
    type: file
    path: src/pages/about.md
    fields:
      - { name: layout, type: string, hidden: true, default: "../layouts/AboutLayout.astro" }
      - { name: title, label: Title, type: string }
      - { name: body, label: Body, type: rich-text, options: { input: public/assets, output: /assets } }
